name: Build Japan Moto

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows.txt

      - name: Build onedir exe
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --noupx --onedir --windowed --name JapanMoto `
            --collect-submodules win32com --collect-data win32com `
            --add-data "6055.xls;." `
            --add-data "6055_MOTO_template.xls;." `
            --add-data "DOGOVIR_6055_template.doc;." `
            --add-data "vidatkova.xls;." `
            app_6055.py

      - name: Zip release folder
        shell: pwsh
        run: Compress-Archive -Path dist/JapanMoto -DestinationPath dist/JapanMoto.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JapanMoto-windows
          path: dist/JapanMoto.zip

      - name: Publish latest public release asset
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $isTag = "${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true"
          if ($isTag) {
            $tag = "${{ github.ref_name }}"
            $title = "JapanMoto $tag"
          }
          else {
            $tag = "latest-build"
            $title = "JapanMoto latest build"
          }

          if (Test-Path "RELEASE_NOTES.md") {
            $notes = Get-Content "RELEASE_NOTES.md" -Raw
          }
          else {
            $notes = "Automated build from commit $env:GITHUB_SHA"
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag dist/JapanMoto.zip --title "$title" --notes "$notes" --latest --repo $env:GITHUB_REPOSITORY
          }
          else {
            gh release upload $tag dist/JapanMoto.zip --clobber --repo $env:GITHUB_REPOSITORY
            gh release edit $tag --title "$title" --notes "$notes" --latest --repo $env:GITHUB_REPOSITORY
          }